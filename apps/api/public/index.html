<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{--bg:#f5f0eb;--card:#fff;--text:#1a1a2e;--purple:#5c4d7d;--light-purple:#e8e0f0;--gold:#c9a84c;--red:#c0392b;--green:#27ae60;--tab-active:#5c4d7d;--tab-inactive:#999}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:70px}
.hidden{display:none!important}
.app-header{background:linear-gradient(135deg,#2d1b69,#5c4d7d);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.app-header .title-area{text-align:center;flex:1}
.app-header h1{font-size:18px;font-weight:600}
.app-header p{font-size:11px;opacity:.8;margin-top:1px}
.lang-toggle{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s}
.lang-toggle:active{background:rgba(255,255,255,.3)}
.screen{padding:16px;max-width:600px;margin:0 auto}
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.hex-symbol{font-size:56px;text-align:center;line-height:1.1}
.hex-name{text-align:center;font-size:20px;font-weight:700;margin:8px 0;color:var(--purple)}
.theme-tag{display:inline-block;background:var(--light-purple);color:var(--purple);padding:4px 16px;border-radius:20px;font-size:13px}
.guidance-text{line-height:1.8;margin-top:12px;font-size:15px}
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.mood-btn{padding:10px;border:2px solid #ddd;border-radius:12px;background:#fff;font-size:24px;cursor:pointer;text-align:center;transition:.2s}
.mood-btn:active,.mood-btn.selected{border-color:var(--purple);background:var(--light-purple)}
.btn{background:var(--purple);color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;cursor:pointer;width:100%;font-weight:600;transition:.2s}
.btn:active{opacity:.8}
.btn-outline{background:#fff;color:var(--purple);border:2px solid var(--purple);margin-top:8px}
.input{border:2px solid #ddd;border-radius:12px;padding:14px;font-size:15px;width:100%;background:#fff;font-family:inherit}
.input:focus{border-color:var(--purple);outline:none}
textarea.input{min-height:100px;resize:vertical}
.label{font-size:14px;font-weight:600;color:var(--purple);margin-bottom:6px;display:block}
.feed-item{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.feed-item .author{font-size:14px;font-weight:600;color:var(--purple)}
.feed-item .time{font-size:11px;color:#999}
.feed-item .content{font-size:14px;margin-top:6px;line-height:1.6}
.feed-item .tag{display:inline-block;background:var(--light-purple);color:var(--purple);padding:2px 10px;border-radius:10px;font-size:11px;margin-top:6px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #eee;z-index:10;padding:6px 0 env(safe-area-inset-bottom)}
.nav-item{flex:1;text-align:center;padding:6px 0;cursor:pointer;color:var(--tab-inactive);font-size:11px;transition:.2s}
.nav-item.active{color:var(--tab-active)}
.nav-item .icon{font-size:22px;display:block}
.loading{text-align:center;padding:60px 20px;color:#999;font-size:15px}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:48px;display:block;margin-bottom:12px}
.form-group{margin-bottom:14px}
.form-row{display:flex;gap:10px}
.form-row>*{flex:1}
.user-id-display{font-size:12px;color:#999;text-align:center;margin-top:8px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;z-index:99;font-size:14px;transition:.3s;opacity:0;pointer-events:none}
.toast.show{opacity:1}

.email-status{font-size:13px;padding:8px 12px;border-radius:10px;margin-bottom:10px}
.email-status.set{background:#e8f5e9;color:#2e7d32}
.email-status.notset{background:#fff3e0;color:#e65100}

.lang-select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:5px 8px;border-radius:16px;font-size:12px;cursor:pointer;outline:none}
.lang-select option{color:#333;background:#fff}
</style>
</head>

let LANG=localStorage.getItem('yijing_lang')||(navigator.language.startsWith('zh')?'zh':navigator.language.startsWith('ja')?'ja':navigator.language.startsWith('ko')?'ko':navigator.language.startsWith('es')?'es':navigator.language.startsWith('fr')?'fr':navigator.language.startsWith('de')?'de':navigator.language.startsWith('pt')?'pt':navigator.language.startsWith('ru')?'ru':navigator.language.startsWith('ar')?'ar':'en');
function t(key) { return I18N[LANG][key] || key; }
function changeLang(l){LANG=l;localStorage.setItem('yijing_lang',l);applyI18n();refreshCurrentScreen();}
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.dataset.i18n; if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') { el.placeholder = t(k); } else { el.textContent = t(k); } });
  document.querySelector('.lang-toggle').textContent = t('langLabel');
  document.title = t('appTitle');
}

const API = '/v1';
let uid = localStorage.getItem('yijing_uid') || '';
let userEmail = localStorage.getItem('yijing_email') || '';
let activeScreen = 'today';

function api(path, opts = {}) {
  const url = path.includes('?') ? API + path + '&userId=' + uid : API + path + '?userId=' + uid;
  return fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts }).then(r => r.ok ? r.json() : Promise.reject(r));
}

function showToast(msg) { const tEl = document.getElementById('toast'); tEl.textContent = msg; tEl.classList.add('show'); setTimeout(() => tEl.classList.remove('show'), 2000); }

function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.remove('hidden');
  document.querySelector('[data-screen="' + name + '"]').classList.add('active');
  activeScreen = name;
  if (name === 'today') loadToday();
  else if (name === 'history') loadHistory();
  else if (name === 'community') loadFeed();
  else if (name === 'reflect') renderReflect();
  else if (name === 'profile') renderProfile();
}

function refreshCurrentScreen() { switchScreen(activeScreen); }

document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => switchScreen(n.dataset.screen)));

async function loadToday() {
  const el = document.getElementById('today-content');
  if (!uid) { el.innerHTML = renderEmptyState('👤', t('noProfile'), t('noProfileHint'), 'setupProfileBtn', () => switchScreen('profile')); return; }
  try {
    const d = await api('/guidance/today');
    if (!d || !d.hexagram) { el.innerHTML = renderEmptyState('☯', t('noGuidance'), t('todayHint'), 'setupProfileBtn', () => switchScreen('profile')); return; }
    el.innerHTML = `
      <div class="card" style="text-align:center">
        <div class="hex-symbol">${d.hexagramSymbol || '☯'}</div>
        <div class="hex-name">${t('hexagram') || 'Hexagram'} ${d.hexagram || '—'}: ${d.hexagramName || ''}</div>
        <span class="theme-tag">${d.theme || ''}</span>
        <div class="guidance-text">${d.guidance || ''}</div>
        ${d.moonPhase ? `<p style="font-size:13px;color:#999;margin-top:8px">🌙 ${t('moonPhase')}: ${d.moonPhase} · 🎨 ${t('luckyColor')}: ${d.luckyColor || '—'} · 🔢 ${t('luckyNumber')}: ${d.luckyNumber || '—'}</p>` : ''}
        ${d.doList && d.doList.length ? `<div style="margin-top:12px;text-align:left;font-size:14px;background:#f0faf0;padding:12px;border-radius:12px"><strong>${t('favorable')}:</strong><br>${d.doList.map(i => '· ' + i).join('<br>')}</div>` : ''}
        ${d.dontList && d.dontList.length ? `<div style="margin-top:8px;text-align:left;font-size:14px;background:#faf0f0;padding:12px;border-radius:12px"><strong>${t('caution')}:</strong><br>${d.dontList.map(i => '· ' + i).join('<br>')}</div>` : ''}
        ${d.reflectionQuestion ? `<div class="card" style="background:#f0ebe4;margin-top:12px"><strong>${t('tonightsReflection')}</strong><p style="margin-top:6px;font-style:italic">${d.reflectionQuestion}</p></div>` : ''}
      </div>`;
  } catch (e) { el.innerHTML = renderEmptyState('☯', t('noGuidance'), t('todayHint'), 'setupProfileBtn', () => switchScreen('profile')); }
}

function renderEmptyState(icon, title, desc, btnKey, btnAction) {
  return `<div class="empty-state"><span class="icon">${icon}</span><h3>${title}</h3><p style="margin-top:8px">${desc}</p>${btnKey ? `<button class="btn" style="margin-top:16px" onclick="(${btnAction.toString()})()">${t(btnKey)}</button>` : ''}</div>`;
}

async function loadHistory() {
  const el = document.getElementById('history-content');
  if (!uid) { el.innerHTML = renderEmptyState('📋', t('noProfile'), ''); return; }
  try {
    const list = await api('/reflections');
    if (!list.length) { el.innerHTML = renderEmptyState('📋', t('noHistory'), ''); return; }
    el.innerHTML = list.map(r => `<div class="feed-item"><div class="author">${r.mood || '🤔'}</div><div class="time">${new Date(r.createdAt).toLocaleDateString()}</div><div class="content">${r.note || ''}</div></div>`).join('');
  } catch (e) { el.innerHTML = renderEmptyState('📋', t('noHistory'), ''); }
}

async function loadFeed() {
  const el = document.getElementById('community-content');
  try {
    const posts = await api('/community/feed?page=1&limit=30');
    if (!posts || !posts.length) { el.innerHTML = renderEmptyState('👥', t('noPosts'), ''); return; }
    el.innerHTML = posts.map(p => {
      const name = p.isAnonymous ? t('anonymous') : (p.authorName || t('anonymous'));
      return `<div class="feed-item"><div class="author">${name}</div><div class="time">${new Date(p.createdAt).toLocaleString()}</div><div class="content">${p.content || ''}</div>${p.moodTag ? `<span class="tag">${p.moodTag}</span>` : ''}</div>`;
    }).join('');
  } catch (e) { el.innerHTML = renderEmptyState('👥', t('communityHint'), ''); }
}

function renderReflect() {
  const el = document.getElementById('reflect-content');
  if (!uid) { el.innerHTML = renderEmptyState('🧘', t('noProfile'), ''); return; }
  el.innerHTML = `
    <div class="card"><h3 style="color:var(--purple);margin-bottom:14px">${t('eveningReflection')}</h3>
    <div class="form-group"><label class="label">${t('howWasDay')}</label>
    <div class="mood-grid" id="mood-selector">
      <div class="mood-btn selected" data-mood="😊">😊</div><div class="mood-btn" data-mood="😌">😌</div><div class="mood-btn" data-mood="😐">😐</div><div class="mood-btn" data-mood="😔">😔</div>
    </div></div>
    <div class="form-group"><label class="label">${t('yourThoughts')}</label><textarea class="input" id="reflect-note" placeholder="${t('thoughtsPlaceholder')}"></textarea></div>
    <button class="btn" onclick="submitReflection()">${t('saveReflection')}</button></div>
  `;
  document.querySelectorAll('#mood-selector .mood-btn').forEach(b => b.addEventListener('click', function () {
    document.querySelectorAll('#mood-selector .mood-btn').forEach(x => x.classList.remove('selected'));
    this.classList.add('selected');
  }));
}

async function submitReflection() {
  const mood = document.querySelector('#mood-selector .mood-btn.selected')?.dataset.mood || '😊';
  const note = document.getElementById('reflect-note')?.value || '';
  if (!note.trim()) { showToast(t('writeReflection')); return; }
  try { await api('/reflections', { method: 'POST', body: JSON.stringify({ mood, note }) }); showToast(t('saveSuccess')); loadHistory(); } catch (e) { showToast(t('saveFailed')); }
}

let selectedCountry=null,selectedRegion=null,selectedTz=null;
function onCountryChange(){
  const v=document.getElementById("country-select")?.value;
  const rs=document.getElementById("region-select");
  const cs=document.getElementById("city-select");
  if(!v||!locData[v]){rs.classList.add("hidden");cs.classList.add("hidden");selectedCountry=null;selectedTz=null;return}
  selectedCountry=v;selectedTz=locData[v].tz||null;
  const regions=locData[v].r||{};
  let opts="<option value=\"\">"+t("selectRegion")+"</option>";
  for(let k in regions){opts+="<option value=\""+k+"\">"+regions[k].n+"</option>";}
  rs.innerHTML=opts;rs.classList.remove("hidden");
  cs.classList.add("hidden");selectedRegion=null;
}
function onRegionChange(){
  const v=document.getElementById("region-select")?.value;
  const cs=document.getElementById("city-select");
  if(!v||!selectedCountry||!locData[selectedCountry]||!locData[selectedCountry].r[v]){cs.classList.add("hidden");selectedRegion=null;return}
  selectedRegion=v;
  const cities=locData[selectedCountry].r[v].c||[];
  let opts="<option value=\"\">"+t("selectCity")+"</option>";
  cities.forEach(function(c){opts+="<option value=\""+c+"\">"+c+"</option>";});
  cs.innerHTML=opts;cs.classList.remove("hidden");

    <div class="form-group"><label class="label">${t("emailLabel")}</label><input class="input" type="email" id="profile-email" placeholder="${t("emailPlaceholder")}" value="${userEmail||""}"></div>
    <div class="form-group"><label class="label">${t("birthDate")}</label><input class="input" type="date" id="birth-date"></div>
    <div class="form-group"><label class="label">${t("birthTime")}</label><input class="input" type="time" id="birth-time" value="12:00"></div>
    <div class="form-group"><label class="label">${t("birthPlace")}</label>
      <select class="input" id="country-select" onchange="onCountryChange()"><option value="">${t("selectCountry")}</option>${co}</select>
      <select class="input hidden" id="region-select" onchange="onRegionChange()" style="margin-top:6px"><option value="">${t("selectRegion")}</option></select>
      <select class="input hidden" id="city-select" style="margin-top:6px"><option value="">${t("selectCity")}</option></select>
    </div>
    <div class="form-group"><label class="label">${t("gender")}</label><select class="input" id="gender"><option value="male">${t("male")}</option><option value="female">${t("female")}</option><option value="other">${t("other")}</option></select></div>
    <button class="btn" onclick="saveProfile()">${uid?t("updateProfile"):t("createProfile")}</button>
    ${uid?"<button class=\"btn btn-outline\" onclick=\"resetProfile()\">"+t("resetProfile")+"</button>":""}
    <p class="user-id-display">${t("userId")}: ${uid||"—"}</p></div>
    <div class="card"><h3 style="color:var(--purple);margin-bottom:8px">${t("aboutTitle")}</h3><p style="font-size:14px;line-height:1.7;color:#666">${t("aboutText")}</p></div>
  `;
}

async function saveProfile(){
  const email=document.getElementById("profile-email")?.value?.trim();
  const birthDate=document.getElementById("birth-date")?.value;
  const birthTime=document.getElementById("birth-time")?.value||"12:00";
  const country=document.getElementById("country-select")?.value;
  const region=document.getElementById("region-select")?.value;
  const city=document.getElementById("city-select")?.value;
  const gender=document.getElementById("gender")?.value||"other";
  if(!email){showToast(t("enterEmail")||"Please enter your email");return}
  if(!birthDate){showToast(t("enterBirthDate"));return}
  let pn="";if(city)pn=city;if(region&&country&&locData[country]&&locData[country].r[region]){let rn=locData[country].r[region].n;pn=pn?pn+", "+rn:rn;}if(country&&locData[country]){let cn=locData[country].name;pn=pn?pn+", "+cn:cn;}if(!pn)pn="Unknown";
  const tz=selectedTz||Intl.DateTimeFormat().resolvedOptions().timeZone;
  const body={email,birthDateLocal:birthDate,birthTimeLocal:birthTime,precision:"exact",birthTimezone:tz,encryptedPlace:pn};
  try{
    const res=await fetch(API+"/profiles",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await res.json();
    if(data.userId){uid=data.userId;userEmail=email;localStorage.setItem("yijing_uid",uid);localStorage.setItem("yijing_email",email);showToast(t("profileSaved"));renderProfile();loadToday();}
    else{showToast(t("profileFailed"));}
  }catch(e){showToast(t("profileFailed"));}
}

function resetProfile(){localStorage.removeItem("yijing_uid");localStorage.removeItem("yijing_email");uid="";userEmail="";renderProfile();switchScreen("today");showToast(t("profileSaved"));}

applyI18n();
switchScreen('today');
</script>
</body>
</html>
