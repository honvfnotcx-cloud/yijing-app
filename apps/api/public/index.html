<^!DOCTYPE html> 
<html lang=\"en\"> 
<head> 
<meta charset=\"UTF-8\"> 
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"> 
<title>Daily I Ching</title> 
<style> 
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#f5f0eb;color:#1a1a2e;min-height:100vh} 
.app{max-width:600px;margin:0 auto;padding:20px}header{text-align:center;padding:30px 0}header h1{font-size:28px;color:#5c4d7d} 
.card{background:#fff;border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)} 
.hex-symbol{font-size:64px;text-align:center;line-height:1.2} 
.hex-name{text-align:center;font-size:22px;font-weight:700;margin:8px 0} 
.theme-tag{display:inline-block;background:#e8e0f0;color:#5c4d7d;padding:4px 16px;border-radius:20px;font-size:14px;margin:8px 0} 
.guidance-text{line-height:1.7;margin-top:12px;color:#333} 
.reflection-box{background:#f0ebe4;border-radius:16px;padding:20px;margin-top:16px} 
button{background:#5c4d7d;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:16px;cursor:pointer;width:100%%} 
button:hover{opacity:.9} 
.loading{text-align:center;padding:60px 20px;color:#999} 
.error{text-align:center;padding:40px;color:#c0392b} 
.empty{text-align:center;padding:60px 20px;color:#999}
</style> 
</head> 
<body> 
<div class=\"app\"> 
<header><h1>? Daily I Ching</h1><p>Your daily guidance, powered by the Book of Changes</p></header> 
<div id=\"content\" class=\"loading\">Loading your guidance...</div> 
</div> 
<script> 
const API = '/v1';const uid='demo-user'; 
async function load(){try{const r=await fetch(API+'/guidance/today?userId='+uid);if(!r.ok)throw new Error();const d=await r.json();document.getElementById('content').innerHTML='<div class=\"card\"><div class=\"hex-symbol\">'+d.hexagramSymbol+'</div><div class=\"hex-name\">Hexagram '+d.hexagram+': '+d.hexagramName+'</div><div style=\"text-align:center\"><span class=\"theme-tag\">'+d.theme+'</span></div><div class=\"guidance-text\">'+d.guidance+'</div><div class=\"reflection-box\"><strong>Reflection</strong><p style=\"margin-top:8px;font-style:italic\">'+d.reflectionQuestion+'</p></div></div>'}catch(e){document.getElementById('content').innerHTML='<div class=\"card empty\"><h3>No guidance yet</h3><p>Set up your birth profile to receive daily I Ching readings.</p><p style=\"margin-top:16px\"><code>POST /v1/profiles</code></p></div>'} 
}load();
</script> 
</body> 
</html>
