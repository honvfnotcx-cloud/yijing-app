version: '3.8' 
services: 
  postgres: 
    image: postgres:16-alpine 
    environment: { POSTGRES_USER: yijing, POSTGRES_PASSWORD: yijing_dev, POSTGRES_DB: yijing } 
    ports: ['5432:5432'] 
    volumes: ['pgdata:/var/lib/postgresql/data'] 
  redis: 
    image: redis:7-alpine 
    ports: ['6379:6379']
  api: 
    build: ./apps/api 
    ports: ['3000:3000'] 
    environment: 
      DATABASE_URL: postgresql://yijing:yijing_dev@postgres:5432/yijing 
      REDIS_URL: redis://redis:6379 
    depends_on: [postgres, redis] 
volumes: 
  pgdata:
